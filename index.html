<style>
  :root{
    --cream:#F7F1E1; --cream-2:#efe6cf;
    --ink:#26303f; --blue:#1F3A6E; --maroon:#7A1F1F; --gold:#B8862B;
    --muted:#6b675d; --line:rgba(184,134,43,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:Georgia,'Times New Roman',serif;color:var(--ink);background:#0e1320;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .stage{position:relative;width:100%;max-width:680px;border-radius:18px;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.45);background:var(--cream);}
  .hero{position:relative;height:230px;background-size:cover;background-position:center top;background-image:linear-gradient(180deg,rgba(14,19,32,.15),rgba(247,241,225,.05) 60%,rgba(247,241,225,1)),url('assets/home.jpg');}
  .logos{position:absolute;top:16px;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:0 20px;}
  .logos img{height:46px;width:auto;filter:drop-shadow(0 2px 6px rgba(0,0,0,.25))}
  .body{padding:30px 34px 36px;text-align:center}
  .kicker{letter-spacing:.18em;text-transform:uppercase;font-size:12px;color:var(--gold);font-family:Arial,Helvetica,sans-serif;margin:0 0 6px}
  h1{margin:.1em 0 .15em;font-size:34px;color:var(--blue);line-height:1.15}
  .session{font-size:21px;color:var(--maroon);margin:0 0 14px}
  .when{display:inline-flex;gap:14px;align-items:center;justify-content:center;font-family:Arial,Helvetica,sans-serif;font-size:14px;color:var(--ink);background:var(--cream-2);border:1px solid var(--line);border-radius:999px;padding:8px 18px;margin-bottom:18px;}
  .countdown{margin:2px auto 24px;max-width:430px;min-height:46px}
  .cd-label{font-family:Arial,Helvetica,sans-serif;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin:0 0 8px}
  .cd-clock{display:flex;justify-content:center;gap:8px}
  .cd-unit{background:var(--cream-2);border:1px solid var(--line);border-radius:10px;padding:8px 10px;min-width:58px}
  .cd-num{font-family:Georgia,serif;font-size:28px;font-weight:bold;color:var(--blue);line-height:1}
  .cd-cap{font-family:Arial,Helvetica,sans-serif;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:5px}
  .live{display:inline-flex;align-items:center;gap:9px;font-family:Arial,Helvetica,sans-serif;font-weight:bold;color:#fff;background:#b8323b;padding:9px 20px;border-radius:999px;font-size:15px}
  .live .dot{width:9px;height:9px;border-radius:50%;background:#fff;animation:pulse 1.2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  .synopsis-wrap{max-width:540px;margin:0 auto 26px;text-align:left;background:#fffdf7;border:1px solid var(--line);border-radius:12px;padding:16px 20px;}
  .synopsis-label{font-family:Arial,Helvetica,sans-serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin:0 0 6px}
  .synopsis{font-size:16px;line-height:1.6;color:#4b4636;margin:0}
  .field{max-width:380px;margin:0 auto}
  label{display:block;text-align:left;font-family:Arial,Helvetica,sans-serif;font-size:13px;color:var(--muted);margin:0 0 6px}
  input[type=text]{width:100%;padding:14px 16px;font-size:17px;font-family:Georgia,serif;border:1px solid var(--line);border-radius:10px;background:#fffdf7;color:var(--ink);outline:none;transition:border-color .15s,box-shadow .15s;}
  input[type=text]:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,134,43,.18)}
  .err{color:var(--maroon);font-family:Arial,Helvetica,sans-serif;font-size:13px;min-height:18px;text-align:left;margin:6px 2px 0}
  .watch{display:block;width:100%;margin-top:6px;cursor:pointer;padding:15px 18px;font-size:18px;font-family:Georgia,serif;font-weight:bold;color:#fff;background:linear-gradient(180deg,#27508f,#1F3A6E);border:none;border-radius:10px;box-shadow:0 8px 20px rgba(31,58,110,.35);transition:transform .08s,box-shadow .15s;}
  .watch:hover{box-shadow:0 12px 26px rgba(31,58,110,.45)}
  .watch:active{transform:translateY(1px)}
  .watch[disabled]{opacity:.55;cursor:not-allowed;box-shadow:none}
  .register{display:block;margin:16px auto 0;font-family:Arial,Helvetica,sans-serif;font-size:14px;color:var(--blue);text-decoration:none}
  .register span{border-bottom:1px solid var(--line)}
  .register:hover span{border-color:var(--blue)}
  .divider{height:1px;background:var(--line);margin:26px auto 18px;max-width:420px}
  .footer{font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#8a8472;line-height:1.6}
  .footer .tag{font-style:italic;color:#a59a7f}
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:#1F3A6E;color:#fff;padding:12px 20px;border-radius:10px;font-family:Arial,sans-serif;font-size:14px;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;box-shadow:0 10px 30px rgba(0,0,0,.35);}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media (max-width:520px){.hero{height:170px}.logos img{height:38px}h1{font-size:27px}.body{padding:24px 20px 30px}}
</style>

<body>
  <main class="stage">
    <div class="hero">
      <div class="logos">
        <img src="assets/drnac.png" alt="Dr. NAC's" />
        <img src="assets/svmf.png" alt="Sri Vishnu Mohan Foundation" />
      </div>
    </div>
    <div class="body">
      <p class="kicker">Sri Vishnu Mohan Foundation presents</p>
      <h1>Workshop on Bhagavatham</h1>
      <p class="session" id="session">Session</p>
      <div class="when"><span id="when-date">—</span> · <span id="when-time">—</span></div>

      <div class="countdown" id="cd"></div>

      <div class="field">
        <label for="name">Your full name</label>
        <input type="text" id="name" autocomplete="name" placeholder="e.g. Radha Krishnan" />
        <div class="err" id="err"></div>
        <button class="watch" id="watch">Watch now &nbsp;&rsaquo;</button>
        <a class="register" id="register" href="#"><span>New here? Register for the workshop</span></a>
      </div>

      <div class="synopsis-wrap">
        <p class="synopsis-label" id="synopsis-label">In this session</p>
        <p class="synopsis" id="synopsis">—</p>
      </div>

      <div class="divider"></div>
      <div class="footer">
        Sri Vishnu Mohan Foundation<br />
        <span class="tag">nahi jnanena sadrsam pavitram iha vidyate — “There is nothing so purifying as knowledge.”</span>
      </div>
    </div>
  </main>
  <div class="toast" id="toast"></div>

<script>
  /* ===== SCHEDULE (master copy lives in the Sheet "Schedule" tab — keep in sync) =====
     One entry per session. The page auto-advances to the next session the moment the
     current one ends, and the countdown resets. */
  const SESSIONS = [
    {
      episode: "Session 14",
      startsAt: "2026-06-22T18:25:00+05:30",  // premiere goes live (5-min countdown, talk at 6:30)
      endsAt:   "2026-06-22T19:10:00+05:30",  // after this the page advances to the next session
      timeLabel: "6:30 PM IST",
      synopsis: "On the boundless compassion of the Lord — Karuṇā Sindhu, the very ocean of mercy. Through Draupadi's protection in her hour of need and the deliverance of Gajendra, we reflect on how the Divine answers the sincere call of every devotee.",
      watchUrl: "https://www.youtube.com/watch?v=_R9uDW8fn9I"
    },
    {
      episode: "Session 15",
      startsAt: "2026-06-25T18:25:00+05:30",
      endsAt:   "2026-06-25T19:10:00+05:30",
      timeLabel: "6:30 PM IST",
      synopsis: "The Vāmana Avatāra and the humbling of ego — the emperor Mahābali's surrender of his all, the great churning of the ocean, and Lord Śiva drinking the Hālāhala poison to become Nīlakaṇṭha — opening the gateway to the Ninth Canto.",
      watchUrl: "https://www.youtube.com/watch?v=CR0UXHvZ09s"
    },
    {
      episode: "Session 16",
      startsAt: "2026-06-29T18:25:00+05:30",
      endsAt:   "2026-06-29T19:10:00+05:30",
      timeLabel: "6:30 PM IST",
      synopsis: "Entering the Ninth Canto (Navama Skandha) — the great solar and lunar dynasties, from Ikṣvāku and Śrī Rāma of Ayodhyā to Yayāti and the line of the Yadus, leading toward the radiant devotion of King Ambarīṣa.",
      watchUrl: "https://www.youtube.com/watch?v=HIN3fLgdoKc"
    },
    {
      episode: "Session 17",
      startsAt: "2026-07-02T18:25:00+05:30",
      endsAt:   "2026-07-02T19:10:00+05:30",
      timeLabel: "6:30 PM IST",
      synopsis: "Entering the Tenth Canto (Daśama Skandha) — a panorama of Śrī Kṛṣṇa's life and līlās through the summarising verses, from His birth in the Yadu dynasty to the lifting of Govardhana, the Rāsa Līlā, the end of Kaṁsa, and the glories of Dvārakā.",
      watchUrl: "https://www.youtube.com/watch?v=gCwCHs0ex0Y"
    },
    {
      episode: "Session 18",
      startsAt: "2026-07-06T18:25:00+05:30",
      endsAt:   "2026-07-06T19:10:00+05:30",
      timeLabel: "6:30 PM IST",
      synopsis: "The Tenth Canto begins — the divine birth of Śrī Kṛṣṇa in the prison of Mathurā, His four-armed form, the play of Yogamāyā, the deliverance of Pūtanā, and the many faces of devotion — how even fear and enmity, fixed upon the Lord, become a path to liberation.",
      watchUrl: "https://www.youtube.com/watch?v=ve5EvRcP6eA"
    },
    {
      episode: "Session 19",
      startsAt: "2026-07-09T18:25:00+05:30",
      endsAt:   "2026-07-09T19:10:00+05:30",
      timeLabel: "6:30 PM IST",
      synopsis: "The Rāsa Līlā and the Gopikā Gītam — the heart of the Tenth Canto. How the faint shadow of 'He is mine' veiled the Lord from the Gopīs, and how the chanting of the holy Name dissolved their ego and restored His presence.",
      watchUrl: "https://www.youtube.com/watch?v=hjgbd8Sh2q8"
    },
    {
      episode: "Session 20",
      startsAt: "2026-07-13T18:25:00+05:30",
      endsAt:   "2026-07-13T19:10:00+05:30",
      timeLabel: "6:30 PM IST",
      synopsis: "The culmination of the Tenth Canto — Akrūra carries Kṛṣṇa and Balarāma to Mathurā, the slaying of Kaṁsa, and the meeting of Uddhava and the Gopīs, where the Lord reveals their selfless love as the highest devotion.",
      watchUrl: "https://www.youtube.com/watch?v=-D2Om-g9SYM"
    },
    {
      episode: "Session 21",
      startsAt: "2026-07-16T18:25:00+05:30",
      endsAt:   "2026-07-16T19:10:00+05:30",
      timeLabel: "6:30 PM IST",
      synopsis: "Entering the Eleventh Canto (Ekādaśa Skandha) — the Lord's parting wisdom through the Uddhava Gītā, the teachings of the Nava-Yogis and the avadhūta's twenty-four gurus, and the supreme refuge of the Holy Name in Kali Yuga.",
      watchUrl: "https://www.youtube.com/watch?v=gc8kc2GkjqM"
    }
  ];

  const CONFIG = {
    registerUrl: "https://n8n.epixentertainment.com/form/bhagavatam-register",
    attendanceWebhook: "https://n8n.epixentertainment.com/webhook/bhagavatam-attendance"
  };

  const $ = id => document.getElementById(id);
  function prettyDate(iso){ try{ return new Date(iso).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric',timeZone:'Asia/Kolkata'}); }catch(e){ return ''; } }
  function pick(now){ const list=[...SESSIONS].sort((a,b)=>Date.parse(a.startsAt)-Date.parse(b.startsAt)); return list.find(s=>Date.parse(s.endsAt)>now) || list[list.length-1] || null; }

  let current = null;
  function render(s){
    current = s;
    $('session').textContent = s ? s.episode : '';
    $('when-date').textContent = s ? prettyDate(s.startsAt) : '';
    $('when-time').textContent = s ? s.timeLabel : '';
    $('synopsis').textContent = s ? s.synopsis : '';
    $('synopsis-label').textContent = "In this session";
    $('register').href = CONFIG.registerUrl;
  }
  function pad(n){ return String(n).padStart(2,'0'); }
  function unit(n,c){ return '<div class="cd-unit"><div class="cd-num">'+pad(n)+'</div><div class="cd-cap">'+c+'</div></div>'; }
  function tick(){
    const now = Date.now();
    const s = pick(now);
    if(!s){ $('cd').innerHTML=''; return; }
    if(!current || s.episode!==current.episode){ render(s); }   // first render / auto-advance to next session
    const start = Date.parse(s.startsAt), end = Date.parse(s.endsAt), cd = $('cd');
    if(now < start){
      let r = Math.floor((start-now)/1000);
      const days=Math.floor(r/86400); r-=days*86400;
      const hrs=Math.floor(r/3600); r-=hrs*3600;
      const min=Math.floor(r/60); const sec=r-min*60;
      cd.innerHTML = '<div class="cd-label">Begins in</div><div class="cd-clock">'+unit(days,'Days')+unit(hrs,'Hrs')+unit(min,'Min')+unit(sec,'Sec')+'</div>';
    } else if(now < end){
      cd.innerHTML = '<span class="live"><span class="dot"></span> Live now — watch below</span>';
    } else { cd.innerHTML = ''; }
  }
  tick(); setInterval(tick,1000);

  // ---- form ----
  const nameEl=$('name'), errEl=$('err'), btn=$('watch'), toast=$('toast');
  function showToast(m){ toast.textContent=m; toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),2600); }
  try{ const v=localStorage.getItem('bw_name'); if(v) nameEl.value=v; }catch(e){}
  function utm(){ const p=new URLSearchParams(location.search); const o={}; ['utm_source','utm_medium','utm_campaign'].forEach(k=>o[k]=p.get(k)||''); return o; }
  async function go(){
    const name=nameEl.value.trim();
    if(name.length<2){ errEl.textContent="Please enter your full name to continue."; nameEl.focus(); return; }
    errEl.textContent=""; try{ localStorage.setItem('bw_name',name); }catch(e){}
    try{ if(window.fbq) fbq('track','Lead',{content_name:current&&current.episode}); }catch(e){}
    try{ if(window.ttq) ttq.track('SubmitForm',{content_name:current&&current.episode}); }catch(e){}
    btn.disabled=true; btn.textContent="Opening…";
    const payload={ full_name:name, episode:current?current.episode:'', watch_url:current?current.watchUrl:'', referrer:document.referrer, ...utm(), ts:new Date().toISOString() };
    if(CONFIG.attendanceWebhook){ try{ await fetch(CONFIG.attendanceWebhook,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload),keepalive:true}); }catch(e){} }
    if(current && current.watchUrl){ location.href=current.watchUrl; }
    else { btn.disabled=false; btn.textContent="Watch now  ›"; showToast("The session link goes live shortly — thank you, "+name.split(' ')[0]+"!"); }
  }
  btn.addEventListener('click',go);
  nameEl.addEventListener('keydown',e=>{ if(e.key==='Enter') go(); });
</script>
</body>
</html>
